# =====================================================================
# Kinanti — stack lengkap: web + bot + Supabase minimal (Postgres+Storage)
# Semua env diambil dari file .env (dibuat oleh setup.sh dari .env.docker.example)
# =====================================================================

name: kinanti

services:
  # ---------------- Database (Postgres + role bawaan Supabase) ----------------
  db:
    image: supabase/postgres:15.8.1.060
    container_name: kinanti-db
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase-local/db-init/99-roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./supabase-local/db-init/99-jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15
    # Hanya expose ke localhost VPS (untuk psql/backup manual), tidak publik.
    ports:
      - "127.0.0.1:5432:5432"

  # ---------------- PostgREST (dibutuhkan storage-api) ----------------
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: kinanti-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ---------------- Supabase Storage (backend file lokal) ----------------
  storage:
    image: supabase/storage-api:v1.60.4
    container_name: kinanti-storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      AUTH_JWT_SECRET: ${JWT_SECRET}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_PUBLIC_URL: ${SUPABASE_URL}
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      GLOBAL_S3_BUCKET: ${GLOBAL_S3_BUCKET}
      TENANT_ID: ${STORAGE_TENANT_ID}
      REGION: ${REGION}
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------- Web (Next.js) ----------------
  web:
    build:
      context: ./kinanti
    image: kinanti-web:latest
    container_name: kinanti-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DIRECT_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      APP_MODE: ${APP_MODE}
      WEBHOOK_TUGAS_URL: ${WEBHOOK_TUGAS_URL}
      BOT_INTERNAL_URL: http://bot:4000/broadcast
      BOT_SECRET: ${BOT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AI_KEY_COOLDOWN_MINUTES: ${AI_KEY_COOLDOWN_MINUTES}
    ports:
      - "127.0.0.1:3000:3000"

  # ---------------- Bot WhatsApp ----------------
  bot:
    build:
      context: ./bot-kinanti
    image: kinanti-bot:latest
    container_name: kinanti-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DIRECT_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      BOT_SECRET: ${BOT_SECRET}
      BOT_PORT: 4000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_KEY_COOLDOWN_MINUTES: ${AI_KEY_COOLDOWN_MINUTES}
      WEBHOOK_TUGAS_URL: ${WEBHOOK_TUGAS_URL}
    volumes:
      - wa_auth:/app/.wwebjs_auth
    ports:
      - "127.0.0.1:4000:4000"

  # ---------------- Caddy (reverse proxy + auto-HTTPS) ----------------
  caddy:
    image: caddy:2
    container_name: kinanti-caddy
    restart: unless-stopped
    depends_on:
      - web
      - storage
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    # Agar panggilan server-side dari web/bot ke https://$DOMAIN (mis. upload &
    # unduh PDF ke Storage) tetap masuk lewat Caddy secara internal — tanpa
    # bergantung pada hairpin-NAT VPS.
    networks:
      default:
        aliases:
          - ${DOMAIN}

volumes:
  db_data:
  storage_data:
  wa_auth:
  caddy_data:
  caddy_config:
